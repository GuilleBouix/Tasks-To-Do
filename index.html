<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css" integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="icon" href="icon.ico">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
    <title>Tasks To Do!</title>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <button type="button" id="ES" onclick="toggleLanguage()">ENG</button>
        </div>
        <div class="title" id="title">
            <h1>Tasks To Do!</h1>
        </div>
        <div class="input-box" id="input-box">
            <span class="icon-task" id="icon-task"><i class="fa-solid fa-list-check"></i></span>
            <input type="text" id="text-task" required>
            <label id="newtask">New Task</label>
        </div>
        <div class="input-box" id="input-box">
            <span class="icon" id="icon-date"><i class="fa-regular fa-calendar-days"></i></span>
            <input type="text" id="text-date" class="input-date" required>
            <label id="date">Date or Time</label>
        </div>
        <button type="button" class="add" id="add" onclick="addTask()">Add Task</button>
    </div>
    
    <div class="notification_box">
        <i class="bx bx-check"></i>
        <div class="box_text">
            <h3>Success</h3>
            <p>Task saved successfully</p>
        </div>
        <i class="bx bx-x close_btn"></i>
</body>
</html>
