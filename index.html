<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css" integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
    <title>To Do! - Tasks List</title>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <button type="button" id="EN" onclick="toggleLanguage()">ESP</button>
        </div>
        <div class="title" id="title">
            <h1>Tasks To Do!</h1>
        </div>

        <div class="input-box" id="input-box">
            <span class="icon-task" id="icon-task"><i class="fa-solid fa-list-check"></i></span>
            <input type="text" id="text-task" required>
            <label id="newtask">New Task</label>
        </div>
        <div class="input-box" id="input-box">
            <span class="icon" id="icon-date"><i class="fa-regular fa-calendar-days"></i></span>
            <input type="text-date" id="text-date" required>
            <label id="date">Date</label>
        </div>
        <button type="button" class="add" id="add">Add Task</button>

        <div class="tasks" id="tasks">
            <div class="task-info">
                <label>Estudiar examen fin de año</label>
                <div class="task-date">
                    <span>14/09/2024</span>
                </div>
            </div>
            <div class="task-actions">
                <label class="pulse"></label>
            </div>
        </div>
    </div>
</body>
</html>
